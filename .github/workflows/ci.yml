###############################################################################
# EcoWoods Platform — Continuous Integration
#
# Checks:
#   1. Docker Build        — verifies the container builds cleanly
#   2. Lint & Format       — ruff linter + black formatter
#   3. Security Scan       — bandit static analysis
#   4. Tests (Python 3.11) — pytest with coverage
#   5. Tests (Python 3.12) — pytest with coverage
#   6. Tests (Python 3.13) — pytest with coverage
###############################################################################

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Docker Build ────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ecowoods-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify docker-compose config
        run: docker compose config --quiet

  # ── 2. Lint & Format ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff black

      - name: Ruff lint
        run: ruff check backend/ --config backend/pyproject.toml

      - name: Black format check
        run: black --check --config backend/pyproject.toml backend/

  # ── 3. Security Scan ──────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -r backend/app/ -c backend/pyproject.toml

  # ── 4-6. Tests (matrix: 3.11, 3.12, 3.13) ────────────────────────────
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecowoods_test
          POSTGRES_PASSWORD: ecowoods_test
          POSTGRES_DB: ecowoods_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecowoods_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://ecowoods_test:ecowoods_test@localhost:5432/ecowoods_test_db
      DATABASE_URL_SYNC: postgresql+psycopg2://ecowoods_test:ecowoods_test@localhost:5432/ecowoods_test_db
      SECRET_KEY: ci-test-secret-key-not-for-production
      TESTING: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
