name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ecowoods-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify docker-compose config
        run: docker compose config --quiet

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install ruff black
      - name: Ruff lint
        run: ruff check backend/ --config backend/pyproject.toml
      - name: Black format check
        run: black --check --config backend/pyproject.toml backend/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install "bandit[toml]"
      - name: Run bandit
        run: bandit -r backend/app/ -c backend/pyproject.toml

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      DATABASE_URL: "sqlite+aiosqlite://"
      DATABASE_URL_SYNC: "sqlite://"
      SECRET_KEY: ci-test-secret-key-not-for-production
      TESTING: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short -p no:cacheprovider
