###############################################################################
# EcoWoods Platform - Docker Compose
# Single-command startup: docker compose up --build
###############################################################################

version: "3.9"

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: ecowoods-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecowoods}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecowoods_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ecowoods_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecowoods -d ecowoods_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- FastAPI Backend + Admin Dashboard ----
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ecowoods-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecowoods}:${POSTGRES_PASSWORD:-ecowoods_secret}@db:5432/${POSTGRES_DB:-ecowoods_db}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-ecowoods}:${POSTGRES_PASSWORD:-ecowoods_secret}@db:5432/${POSTGRES_DB:-ecowoods_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '["*"]'
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./admin-dashboard:/app/admin-dashboard:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  pgdata:
    driver: local
